name: Deploy to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure app dir exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.VPS_APP_DIR }}"

      - name: Upload app to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "."
          target: ${{ secrets.VPS_APP_DIR }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
          APP_PORT: ${{ secrets.PORT }}
          GITHUB_SHA: ${{ github.sha }}
          PORT: ${{ secrets.PORT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASS: ${{ secrets.POSTGRES_PASS }}
          POSTGRES_DB_NAME: ${{ secrets.POSTGRES_DB_NAME }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          APP_ENV: ${{ secrets.APP_ENV }}
          JWT_PRIVATE_KEY_BASE_64: ${{ secrets.JWT_PRIVATE_KEY_BASE_64 }}
          JWT_PUBLIC_KEY_BASE_64: ${{ secrets.JWT_PUBLIC_KEY_BASE_64 }}
          WHATSAPP_API_URL: ${{ secrets.WHATSAPP_API_URL }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          envs: APP_DIR,IMAGE_NAME,CONTAINER_NAME,APP_PORT,GITHUB_SHA,PORT,POSTGRES_USER,POSTGRES_PASS,POSTGRES_DB_NAME,POSTGRES_HOST,POSTGRES_PORT,APP_ENV,JWT_PRIVATE_KEY_BASE_64,JWT_PUBLIC_KEY_BASE_64,WHATSAPP_API_URL,WHATSAPP_API_KEY
          script: |
            set -euo pipefail

            if [ -z "${APP_DIR}" ]; then
              echo "APP_DIR is required" >&2
              exit 1
            fi

            if [ -z "${PORT}" ] || [ -z "${POSTGRES_USER}" ] || [ -z "${POSTGRES_PASS}" ] || [ -z "${POSTGRES_DB_NAME}" ] || [ -z "${POSTGRES_HOST}" ] || [ -z "${POSTGRES_PORT}" ] || [ -z "${APP_ENV}" ] || [ -z "${JWT_PRIVATE_KEY_BASE_64}" ] || [ -z "${JWT_PUBLIC_KEY_BASE_64}" ] || [ -z "${WHATSAPP_API_URL}" ] || [ -z "${WHATSAPP_API_KEY}" ]; then
              echo "One or more required env secrets are missing" >&2
              exit 1
            fi

            if [ -z "${IMAGE_NAME}" ]; then
              IMAGE_NAME="cresc-campo-api"
            fi

            if [ -z "${CONTAINER_NAME}" ]; then
              CONTAINER_NAME="cresc-campo-api"
            fi

            if [ -z "${APP_PORT}" ]; then
              APP_PORT="5000"
            fi

            POSTGRES_HOST_VALUE="${POSTGRES_HOST}"
            if [ "${POSTGRES_HOST_VALUE}" = "localhost" ] || [ "${POSTGRES_HOST_VALUE}" = "127.0.0.1" ]; then
              POSTGRES_HOST_VALUE="host.docker.internal"
            fi

            cd "${APP_DIR}"

            touch .env
            : > .env
            printf '%s\n' "PORT=${PORT}" >> .env
            printf '%s\n' "POSTGRES_USER=${POSTGRES_USER}" >> .env
            printf '%s\n' "POSTGRES_PASS=${POSTGRES_PASS}" >> .env
            printf '%s\n' "POSTGRES_DB_NAME=${POSTGRES_DB_NAME}" >> .env
            printf '%s\n' "POSTGRES_HOST=${POSTGRES_HOST_VALUE}" >> .env
            printf '%s\n' "POSTGRES_PORT=${POSTGRES_PORT}" >> .env
            printf '%s\n' "APP_ENV=${APP_ENV}" >> .env
            printf '%s\n' "JWT_PRIVATE_KEY_BASE_64=${JWT_PRIVATE_KEY_BASE_64}" >> .env
            printf '%s\n' "JWT_PUBLIC_KEY_BASE_64=${JWT_PUBLIC_KEY_BASE_64}" >> .env
            printf '%s\n' "WHATSAPP_API_URL=${WHATSAPP_API_URL}" >> .env
            printf '%s\n' "WHATSAPP_API_KEY=${WHATSAPP_API_KEY}" >> .env

            docker build --target migrator -t "${IMAGE_NAME}:migrator-${GITHUB_SHA}" .
            docker run --rm --env-file .env --add-host=host.docker.internal:host-gateway "${IMAGE_NAME}:migrator-${GITHUB_SHA}"

            docker build -t "${IMAGE_NAME}:${GITHUB_SHA}" -t "${IMAGE_NAME}:latest" .

            if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
              docker stop "${CONTAINER_NAME}"
              docker rm "${CONTAINER_NAME}"
            fi

            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --env-file .env \
              --add-host=host.docker.internal:host-gateway \
              -p "${APP_PORT}:${APP_PORT}" \
              "${IMAGE_NAME}:${GITHUB_SHA}"
