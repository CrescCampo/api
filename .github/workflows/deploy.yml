name: Deploy to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
          APP_PORT: ${{ secrets.PORT }}
          GITHUB_SHA: ${{ github.sha }}
          PORT: ${{ secrets.PORT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASS: ${{ secrets.POSTGRES_PASS }}
          POSTGRES_DB_NAME: ${{ secrets.POSTGRES_DB_NAME }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          APP_ENV: ${{ secrets.APP_ENV }}
          JWT_PRIVATE_KEY_BASE_64: ${{ secrets.JWT_PRIVATE_KEY_BASE_64 }}
          JWT_PUBLIC_KEY_BASE_64: ${{ secrets.JWT_PUBLIC_KEY_BASE_64 }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          envs: APP_DIR,IMAGE_NAME,CONTAINER_NAME,APP_PORT,GITHUB_SHA,PORT,POSTGRES_USER,POSTGRES_PASS,POSTGRES_DB_NAME,POSTGRES_HOST,POSTGRES_PORT,APP_ENV,JWT_PRIVATE_KEY_BASE_64,JWT_PUBLIC_KEY_BASE_64
          script: |
            set -euo pipefail

            if [ -z "${APP_DIR}" ]; then
              echo "APP_DIR is required" >&2
              exit 1
            fi

            if [ -z "${PORT}" ] || [ -z "${POSTGRES_USER}" ] || [ -z "${POSTGRES_PASS}" ] || [ -z "${POSTGRES_DB_NAME}" ] || [ -z "${POSTGRES_HOST}" ] || [ -z "${POSTGRES_PORT}" ] || [ -z "${APP_ENV}" ] || [ -z "${JWT_PRIVATE_KEY_BASE_64}" ] || [ -z "${JWT_PUBLIC_KEY_BASE_64}" ]; then
              echo "One or more required env secrets are missing" >&2
              exit 1
            fi

            if [ -z "${IMAGE_NAME}" ]; then
              IMAGE_NAME="cresc-campo-api"
            fi

            if [ -z "${CONTAINER_NAME}" ]; then
              CONTAINER_NAME="cresc-campo-api"
            fi

            if [ -z "${APP_PORT}" ]; then
              APP_PORT="3000"
            fi

            cd "${APP_DIR}"

            git fetch --all
            git checkout "${GITHUB_SHA}"
            git reset --hard "${GITHUB_SHA}"

            touch .env
            : > .env
            printf '%s\n' "PORT=${PORT}" >> .env
            printf '%s\n' "POSTGRES_USER=${POSTGRES_USER}" >> .env
            printf '%s\n' "POSTGRES_PASS=${POSTGRES_PASS}" >> .env
            printf '%s\n' "POSTGRES_DB_NAME=${POSTGRES_DB_NAME}" >> .env
            printf '%s\n' "POSTGRES_HOST=${POSTGRES_HOST}" >> .env
            printf '%s\n' "POSTGRES_PORT=${POSTGRES_PORT}" >> .env
            printf '%s\n' "APP_ENV=${APP_ENV}" >> .env
            printf '%s\n' "JWT_PRIVATE_KEY_BASE_64=${JWT_PRIVATE_KEY_BASE_64}" >> .env
            printf '%s\n' "JWT_PUBLIC_KEY_BASE_64=${JWT_PUBLIC_KEY_BASE_64}" >> .env

            docker build --target migrator -t "${IMAGE_NAME}:migrator-${GITHUB_SHA}" .
            docker run --rm --env-file .env "${IMAGE_NAME}:migrator-${GITHUB_SHA}"

            docker build -t "${IMAGE_NAME}:${GITHUB_SHA}" -t "${IMAGE_NAME}:latest" .

            if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
              docker stop "${CONTAINER_NAME}"
              docker rm "${CONTAINER_NAME}"
            fi

            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --env-file .env \
              -p "${APP_PORT}:3000" \
              "${IMAGE_NAME}:${GITHUB_SHA}"
