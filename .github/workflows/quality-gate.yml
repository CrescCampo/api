name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-checks:
    name: Lint + Typecheck + Duplication + Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run duplication
      - run: npm run audit:prod
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jscpd-report
          path: api/coverage/jscpd

  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run test:unit:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: api/coverage/unit

  e2e-tests:
    name: E2E Tests + Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cresccampo
          POSTGRES_PASSWORD: cresccampo
          POSTGRES_DB: cresccampo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      E2E_USE_EXTERNAL_POSTGRES: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-reports
          path: |
            api/coverage/e2e
            api/test-reports/e2e
